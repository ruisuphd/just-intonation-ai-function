name: Dependency Hygiene

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Runtime vulnerability audit
        run: pip-audit -r functions/requirements-lock.txt
