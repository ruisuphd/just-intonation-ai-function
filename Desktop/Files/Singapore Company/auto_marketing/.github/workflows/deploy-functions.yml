name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "Makefile"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd functions
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: |
          cd functions
          ruff check .

      - name: Run backend tests
        run: |
          cd functions
          python -m pytest tests/ -v

      - name: Deploy fn-tenant-pipelines
        run: |
          gcloud functions deploy fn-tenant-pipelines \
            --gen2 \
            --runtime=python312 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --source=functions \
            --entry-point=run_tenant_pipelines \
            --trigger-http \
            --region=${{ secrets.GCP_REGION }} \
            --memory=1024MB \
            --timeout=540s \
            --service-account=sa-cloud-functions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --no-allow-unauthenticated \
            --set-env-vars=GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_REGION=${{ secrets.GCP_REGION }},GEMINI_REGION=global,BRAND_DOCS_BUCKET=brand-documents-${{ secrets.GCP_PROJECT_ID }},SMTP_HOST=${{ secrets.SMTP_HOST }},SMTP_PORT=${{ secrets.SMTP_PORT }},SMTP_USER=${{ secrets.SMTP_USER }},SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }},SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }},SMTP_TO_EMAIL=${{ secrets.SMTP_TO_EMAIL }},SMTP_USE_TLS=${{ secrets.SMTP_USE_TLS }},SMTP_USE_SSL=${{ secrets.SMTP_USE_SSL }} \
            --min-instances=0

      - name: Deploy fn-scheduled-publisher
        run: |
          gcloud functions deploy fn-scheduled-publisher \
            --gen2 \
            --runtime=python312 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --source=functions \
            --entry-point=run_scheduled_publisher \
            --trigger-http \
            --region=${{ secrets.GCP_REGION }} \
            --memory=512MB \
            --timeout=300s \
            --service-account=sa-cloud-functions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --no-allow-unauthenticated \
            --set-env-vars=GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_REGION=${{ secrets.GCP_REGION }},GEMINI_REGION=global,BRAND_DOCS_BUCKET=brand-documents-${{ secrets.GCP_PROJECT_ID }} \
            --min-instances=0

      - name: Deploy fn-analytics-sync
        run: |
          gcloud functions deploy fn-analytics-sync \
            --gen2 \
            --runtime=python312 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --source=functions \
            --entry-point=run_analytics_sync \
            --trigger-http \
            --region=${{ secrets.GCP_REGION }} \
            --memory=512MB \
            --timeout=300s \
            --service-account=sa-cloud-functions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --no-allow-unauthenticated \
            --set-env-vars=GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_REGION=${{ secrets.GCP_REGION }},GEMINI_REGION=global,BRAND_DOCS_BUCKET=brand-documents-${{ secrets.GCP_PROJECT_ID }} \
            --min-instances=0

      - name: Deploy automark-api (Cloud Run)
        run: |
          gcloud run deploy automark-api \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ secrets.GCP_REGION }} \
            --source=functions \
            --service-account=sa-cloud-functions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --set-env-vars="^||^GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}||GCP_REGION=${{ secrets.GCP_REGION }}||GEMINI_REGION=global||BRAND_DOCS_BUCKET=brand-documents-${{ secrets.GCP_PROJECT_ID }}||APP_URL=https://automark-web--intonation-labs-marketing.asia-east1.hosted.app||API_URL=https://automark-api-qglnjkfpjq-as.a.run.app||ALLOWED_ORIGINS=http://localhost:3000,https://automark-web--intonation-labs-marketing.asia-east1.hosted.app" \
            --min-instances=0
